robot_config:
  general:
    robot_name: crawler
    nonholonomic: true
    flipper_front: true
    flipper_back: true
    gazebo_ros_control: true
    imu: true

  geometry:
    base_length: 0.45
    base_width: 0.20
    base_height: 0.11
    body_length: 0.45
    body_width: 0.10
    body_height: 0.164
    body_gap: 0.24
    flipper_length: 0.29
    flipper_width: 0.025
    flipper_position: 0.225
    flipper_y_offset: 0.23
    wheel_radius: 0.082

  mass:
    base: 5.0
    body_track: 30.0
    body_sprocket: 0.2
    flipper_arm: 1.0
    flipper_track: 2.0
    flipper_sprocket: 0.2

  joints:
    flipper_lower: -2.35619449
    flipper_upper: 2.35619449
    flipper_torque_max: 8000.0
    flipper_effort: 8000.0
    flipper_velocity: 1.0
    flipper_damping: 2.5
    flipper_friction: 0.05
    flipper_position_kp: 220.0
    flipper_position_ki: 0.0
    flipper_position_kd: 70.0
    flipper_position_max_integral_error: 1000.0
    sprocket_effort: 1000.0
    sprocket_velocity: 100.0

  continuous_track:
    enabled: true
    pitch_diameter: 0.24
    elements_per_round: 20
    belt_element_length: 0.02
    belt_thickness: 0.02
    grouser_height: 0.01
    mu: 0.5
    min_depth: 0.0005
    contact_kp: 120000.0
    contact_kd: 2500.0
    contact_max_vel: 0.01
    implicit_spring_damper: 1

  output:
    urdf: ../../urdf/default_crawler.urdf
