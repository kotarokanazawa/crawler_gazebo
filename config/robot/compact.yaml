robot_config:
  general:
    robot_name: crawler
    nonholonomic: true
    flipper_front: true
    flipper_back: true
    gazebo_ros_control: true
    imu: true

  geometry:
    base_length: 0.36
    base_width: 0.16
    base_height: 0.09
    body_length: 0.36
    body_width: 0.08
    body_height: 0.13
    body_gap: 0.19
    flipper_length: 0.23
    flipper_width: 0.02
    flipper_position: 0.18
    flipper_y_offset: 0.18
    wheel_radius: 0.065

  mass:
    base: 3.0
    body_track: 18.0
    body_sprocket: 0.12
    flipper_arm: 0.6
    flipper_track: 1.2
    flipper_sprocket: 0.12

  joints:
    flipper_lower: -2.35619449
    flipper_upper: 2.35619449
    flipper_torque_max: 5000.0
    flipper_effort: 5000.0
    flipper_velocity: 1.0
    flipper_damping: 2.0
    flipper_friction: 0.05
    flipper_position_kp: 180.0
    flipper_position_ki: 0.0
    flipper_position_kd: 55.0
    flipper_position_max_integral_error: 1000.0
    sprocket_effort: 1000.0
    sprocket_velocity: 100.0

  continuous_track:
    enabled: true
    pitch_diameter: 0.19
    elements_per_round: 20
    belt_element_length: 0.016
    belt_thickness: 0.016
    grouser_height: 0.008
    mu: 0.5
    min_depth: 0.0005
    contact_kp: 100000.0
    contact_kd: 2200.0
    contact_max_vel: 0.01
    implicit_spring_damper: 1

  output:
    urdf: ../../urdf/compact_crawler.urdf
